<body>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="openTab(event, 'dataInput')">✍️ 排班編輯</button>
    <button class="tab-btn" onclick="openTab(event, 'calView')">📅 月曆視圖</button>

<div class="control-bar">

    月份：<select class="sync-month" onchange="syncGlobal('month', this.value)"></select>
    篩選：<select id="filterDept" onchange="renderAll()"></select>
    
    <button id="toggleEditDept" class="btn-edit-mode" onclick="toggleEditDeptMode()">🔓 開啟單位變更</button>

    <div class="zoom-ctrl">
        🔍 縮放：<input type="range" min="12" max="60" value="16" oninput="changeFontSize(this.value)">
        <span id="fontSizeVal">16px</span>
    </div>

    <div class="auto-box">
        🤖 預排：<select id="startM"></select>~<select id="endM"></select>月
        <button onclick="autoScheduleRange()" style="background:#1976d2; color:white; border:none; padding:5px 12px; border-radius:5px; cursor:pointer;">執行自動預排</button>
    </div>

    <button onclick="saveData()">💾 存檔</button>
    <button onclick="document.getElementById('fIn').click()">📂 讀檔</button>
    <button onclick="exportFullYearExcel()" style="background:#2e7d32; color:white;">🚀 匯出 Excel</button>
    <button onclick="window.print()" style="background:#d32f2f; color:white;">🖨️ 列印此頁面</button>
    <input type="file" id="fIn" style="display:none" onchange="loadData(event)">
</div>

<div class="staff-manager">
    <div class="mgr-group">
        <span>🏢 單位管理：</span>
        <input type="text" id="newDeptName" placeholder="新單位名稱" style="width:90px;">
        <button class="btn-add" onclick="manageDept('add')">新增單位</button>
        <select id="delDeptOnlySelect" style="width:100px;"></select>
        <button class="btn-del" onclick="manageDept('del')">刪除整組</button>
    </div>
    <div class="mgr-group">
        <span>👤 人員管理：</span>
        <select id="addStaffToDept"></select>
        <input type="text" id="newStaffName" placeholder="姓名" style="width:70px;">
        <button class="btn-add" onclick="manageStaff('add')">新增</button>
        <select id="delStaffFromDept" onchange="updateDelStaffList(this.value)"></select>
        <select id="delStaffName" style="width:80px;"><option value="">選人</option></select>
        <button class="btn-edit" onclick="manageStaff('edit')">修改姓名</button>
        <button class="btn-del" onclick="manageStaff('del')">刪除</button>
    </div>
</div>

<div id="dataInput" class="tab-content active">

let allRosterData = [], currentYear = 2026, currentMonth = 1, isEditDeptMode = false;

(function init(){
    const ys = document.querySelectorAll(".sync-year"), ms = document.querySelectorAll(".sync-month");
    const sM = document.getElementById("startM"), eM = document.getElementById("endM");
    ys.forEach(s => { for(let y=2025; y<=2030; y++) s.innerHTML += `<option value="${y}">${y}年</option>`; s.value = 2026; });
    ms.forEach(s => { for(let m=1; m<=12; m++) s.innerHTML += `<option value="${m}">${m}月</option>`; s.value = 1; });
    for(let m=1; m<=12; m++){ sM.innerHTML += `<option value="${m}">${m}</option>`; eM.innerHTML += `<option value="${m}">${m}</option>`; }
    sM.value = 5; eM.value = 12;

    const h1 = document.getElementById("hRow1"), h2 = document.getElementById("hRow2");
    h1.innerHTML = `<th rowspan="2" class="fix-col-0">排</th><th rowspan="2" class="fix-col-1">單位</th><th rowspan="2" class="fix-col-2">人員姓名</th><th rowspan="2" class="fix-col-3">全年度<br>次數</th>`;
    for(let m=1; m<=12; m++){ h1.innerHTML += `<th colspan="2">${m}月</th>`; h2.innerHTML += `<th>日期</th><th>時段</th>`; }
    
    updateAllDeptSelectors();
    initData();
})();

function manageDept(action) {
    if(action === 'add') {
        const name = document.getElementById("newDeptName").value.trim();
        if(!name) return alert("請輸入單位名稱");
        if(staffData[name]) return alert("此單位已存在");
        staffData[name] = [];
        document.getElementById("newDeptName").value = "";
    } else {
        const name = document.getElementById("delDeptOnlySelect").value;
        if(!name) return alert("請選擇單位");
        if(!confirm(`⚠️ 確定要刪除整個 [${name}] 嗎？`)) return;
        delete staffData[name];
        allRosterData = allRosterData.filter(p => p.dept !== name);
    }
    updateAllDeptSelectors(); renderAll();
}

function updateAllDeptSelectors() {
    const depts = Object.keys(staffData);
    const filter = document.getElementById("filterDept"), addS = document.getElementById("addStaffToDept"),
          delS = document.getElementById("delStaffFromDept"), delD = document.getElementById("delDeptOnlySelect");
    let html = depts.map(d => `<option value="${d}">${d}</option>`).join('');
    filter.innerHTML = `<option value="ALL">全部單位</option>` + html;
    addS.innerHTML = html; delS.innerHTML = `<option value="">請選單位</option>` + html;
    delD.innerHTML = `<option value="">請選單位</option>` + html;
    updateDelStaffList("");
}

function updateDelStaffList(dept) {
    const sSel = document.getElementById("delStaffName");
    if(!dept || !staffData[dept]) { sSel.innerHTML = `<option value="">選人</option>`; return; }
    sSel.innerHTML = staffData[dept].map(n => `<option value="${n}">${n}</option>`).join('');
}

function manageStaff(action) {
    if(action === 'add') {
        const dept = document.getElementById("addStaffToDept").value, name = document.getElementById("newStaffName").value.trim();
        if(!name) return alert("請輸入姓名");
        if(staffData[dept].includes(name)) return alert("該人員已存在");
        staffData[dept].push(name);
        allRosterData.push({ dept, name, isEnabled: true, schedule: Object.fromEntries(Array.from({length:12}, (_,i)=>[i+1, {date:"", time:""}])) });
        document.getElementById("newStaffName").value = "";
    } else if (action === 'edit') {
        const dept = document.getElementById("delStaffFromDept").value, oldName = document.getElementById("delStaffName").value;
        if(!dept || !oldName) return alert("請選擇要修改的人員");
        const newName = prompt(`修改 [${oldName}] 的姓名為：`, oldName);
        if(!newName || newName === oldName) return;
        staffData[dept] = staffData[dept].map(n => n === oldName ? newName : n);
        allRosterData.forEach(p => { if(p.dept === dept && p.name === oldName) p.name = newName; });
        updateDelStaffList(dept);
    } else {
        const dept = document.getElementById("delStaffFromDept").value, name = document.getElementById("delStaffName").value;
        if(!dept || !name) return alert("請選擇人員");
        if(!confirm(`確定要刪除 ${name} 嗎？`)) return;
        staffData[dept] = staffData[dept].filter(n => n !== name);
        allRosterData = allRosterData.filter(p => !(p.dept === dept && p.name === name));
        updateDelStaffList(dept);
    }
    renderAll();
}

function toggleEditDeptMode() {
    isEditDeptMode = !isEditDeptMode;
    const btn = document.getElementById("toggleEditDept");
    btn.innerText = isEditDeptMode ? "🔒 關閉單位變更" : "🔓 開啟單位變更";
    btn.classList.toggle("active", isEditDeptMode);
    renderAll();
}

function initData() {
    allRosterData = [];
    Object.keys(staffData).forEach(dept => {
        staffData[dept].forEach(name => {
            let p = { dept, name, isEnabled: true, schedule: Object.fromEntries(Array.from({length:12}, (_,i)=>[i+1, {date:"", time:""}])) };
            importData.forEach(item => {
                if (item.am === name) { p.schedule[item.m].date = `${item.m}月${item.d}日`; p.schedule[item.m].time = "上午"; }
                if (item.pm === name) { p.schedule[item.m].date = `${item.m}月${item.d}日`; p.schedule[item.m].time = "下午"; }
            });
            allRosterData.push(p);
        });
    });
    renderAll();
}

function renderAll() {
    const filter = document.getElementById("filterDept").value, tbody = document.getElementById("tb");
    tbody.innerHTML = "";
    const { redConflictKeys, personConflictList } = getConflicts();
    
    allRosterData.forEach((p, idx) => {
        if(filter !== "ALL" && p.dept !== filter) return;
        let total = 0; for(let m=1; m<=12; m++) if(p.schedule[m].date) total++;
        const tr = document.createElement("tr");
        const isConflict = personConflictList.includes(p.name);
        let deptContent = isEditDeptMode ? `<select onchange="changePersonDept(${idx}, this.value)">` + Object.keys(staffData).map(d => `<option value="${d}" ${p.dept===d?'selected':''}>${d}</option>`).join('') + `</select>` : p.dept;

        tr.innerHTML = `
            <td class="fix-col-0"><input type="checkbox" ${p.isEnabled?'checked':''} onchange="toggleStaffEnabled(${idx})"></td>
            <td class="fix-col-1 ${isConflict?'conflict-text':''}">${deptContent}</td>
            <td class="fix-col-2 ${isConflict?'conflict-text':''}">${p.name}</td>
            <td class="fix-col-3">${total}</td>`;
        
        for(let m=1; m<=12; m++) {
            const tdD = document.createElement("td"), tdT = document.createElement("td");
            const sD = document.createElement("select"), sT = document.createElement("select");
            sD.innerHTML = `<option value="">-</option>` + getWorkdays(currentYear, m).map(d=>`<option value="${d}">${d}</option>`).join('');
            sD.value = p.schedule[m].date; sD.onchange = (e) => { p.schedule[m].date = e.target.value; renderAll(); };
            sT.innerHTML = `<option value="">-</option><option value="上午">上午</option><option value="下午">下午</option>`;
            sT.value = p.schedule[m].time; sT.onchange = (e) => { p.schedule[m].time = e.target.value; renderAll(); };
            if(p.schedule[m].date && p.schedule[m].time) {
                const key = `${m}-${p.schedule[m].date}-${p.schedule[m].time}`;
                if(redConflictKeys.includes(key)){ sD.classList.add("conflict-border"); sT.classList.add("conflict-border"); }
                tdD.className = tdT.className = (sT.value==="上午"?"bg-am":"bg-pm");
            }
            tdD.appendChild(sD); tdT.appendChild(sT); tr.appendChild(tdD); tr.appendChild(tdT);
        }
        tbody.appendChild(tr);
    });
    renderCalendar(); renderList();
}

function toggleStaffEnabled(idx) {
    allRosterData[idx].isEnabled = !allRosterData[idx].isEnabled;
}

function changePersonDept(pIdx, newDept) {
    const oldDept = allRosterData[pIdx].dept;
    const name = allRosterData[pIdx].name;
    allRosterData[pIdx].dept = newDept;
    staffData[oldDept] = staffData[oldDept].filter(n => n !== name);
    staffData[newDept].push(name);
}

function getWorkdays(y, m) {
    let days = [], end = new Date(y, m, 0).getDate();
    for(let d=1; d<=end; d++) {
        let wk = new Date(y, m-1, d).getDay(); let key = `${m}-${d}`;
        if(!holidayMap[key] && wk!==0 && wk!==6) days.push(`${m}月${d}日`);
    }
    return days;
}

function getConflicts() {
    let redConflictKeys = [], personConflictList = [], redArr = [], purArr = [];
    for(let m=1; m<=12; m++) {
        let dayCheck = {};
        allRosterData.forEach(p => {
            if(p.schedule[m].date && p.schedule[m].time) {
                let key = `${p.schedule[m].date}-${p.schedule[m].time}`;
                if(!dayCheck[key]) dayCheck[key] = []; dayCheck[key].push(p.name);
            }
        });
        for(let k in dayCheck) if(dayCheck[k].length > 1) {
            redArr.push(`[${m}月 ${k}] 重複：${dayCheck[k].join(',')}`);
            dayCheck[k].forEach(name => { if(!personConflictList.includes(name)) personConflictList.push(name); redConflictKeys.push(`${m}-${k}`); });
        }
    }
    allRosterData.forEach(p => {
        let activeMonths = [];
        for(let m=1; m<=12; m++) if(p.schedule[m].date) activeMonths.push({ m: m, time: p.schedule[m].time });
        for(let i=0; i < activeMonths.length; i++) {
            if(i > 0 && activeMonths[i].time === activeMonths[i-1].time) {
                purArr.push(`⚠️ ${p.name} 在 ${activeMonths[i-1].m}月與 ${activeMonths[i].m}月時段重複 (${activeMonths[i].time})`);
                if(!personConflictList.includes(p.name)) personConflictList.push(p.name);
            }
            if(i < activeMonths.length - 2) {
                if(activeMonths[i+1].m === activeMonths[i].m + 1 && activeMonths[i+2].m === activeMonths[i+1].m + 1) {
                    purArr.push(`🚫 ${p.name} 連續三個月排班 (${activeMonths[i].m}-${activeMonths[i+2].m}月)`);
                    if(!personConflictList.includes(p.name)) personConflictList.push(p.name);
                }
            }
        }
    });
    const rd = document.getElementById("warnRed"), pd = document.getElementById("warnPurple");
    rd.style.display = redArr.length ? "block" : "none"; rd.innerHTML = "🚫 <b>重複：</b><br>" + redArr.join("<br>");
    pd.style.display = purArr.length ? "block" : "none"; pd.innerHTML = "⚠️ <b>規則：</b><br>" + purArr.join("<br>");
    return { redConflictKeys, personConflictList };
}

function autoScheduleRange() {
    const startM = parseInt(document.getElementById("startM").value), endM = parseInt(document.getElementById("endM").value);
    if(startM > endM) return alert("月份範圍錯誤");
    allRosterData.forEach(p => { for(let m=startM; m<=endM; m++){ p.schedule[m].date=""; p.schedule[m].time=""; }});
    for(let m = startM; m <= endM; m++) {
        const workDays = getWorkdays(currentYear, m);
        let slots = [];
        workDays.forEach(d => { slots.push({date: d, time: "上午"}); slots.push({date: d, time: "下午"}); });
        let assignedInMonth = new Set();
        slots.forEach(slot => {
            let candidates = allRosterData
                .filter(p => p.isEnabled && !p.schedule[m].date && !assignedInMonth.has(p.name))
                .map(p => {
                    let totalCount = 0; 
                    for(let i=1; i<=12; i++) if(p.schedule[i].date) totalCount++;
                    let lastTime = "", consecutiveCount = 0, lastMonthAssigned = false;
                    for(let i = m - 1; i >= 1; i--) {
                        if(p.schedule[i].date) {
                            if(lastTime === "") lastTime = p.schedule[i].time;
                            if(i === m - 1) lastMonthAssigned = true;
                            consecutiveCount++;
                        } else if(lastTime !== "") break;
                    }
                    let score = totalCount * 100; 
                    if(lastTime === slot.time) score += 10000; 
                    if(lastMonthAssigned && consecutiveCount >= 2) score += 20000; 
                    let sameDeptInMonth = allRosterData.filter(p2 => p2.dept === p.dept && assignedInMonth.has(p2.name)).length;
                    score -= sameDeptInMonth * 50;
                    score += Math.floor(Math.random() * 30);
                    return { p, score };
                });
            candidates.sort((a,b) => a.score - b.score);
            if(candidates.length > 0) {
                let winner = candidates[0].p;
                winner.schedule[m].date = slot.date;
                winner.schedule[m].time = slot.time;
                assignedInMonth.add(winner.name);
            }
        });
    }
    renderAll();
    alert("預排完成！已排除假日並優化時段衝突。");
}

function changeFontSize(val) {
    document.documentElement.style.setProperty('--main-font-size', val + 'px');
    document.getElementById("fontSizeVal").innerText = val + "px";
}

function syncGlobal(type, val) {
    if(type==='year') currentYear=parseInt(val); else currentMonth=parseInt(val);
    document.getElementById("calTitle").innerText = `115年 ${currentMonth}月 展平鎮 值星`;
    document.getElementById("listTitle").innerText = `115年 ${currentMonth}月 展平鎮 值星`;
    renderAll();
}

function renderCalendar() {
    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = dayNames.map(d=>`<div class="header-highlight" style="font-size:20px !important;">${d}</div>`).join('');
    const first = new Date(currentYear, currentMonth-1, 1).getDay(), end = new Date(currentYear, currentMonth, 0).getDate();
    for(let i=0; i<first; i++) grid.innerHTML += `<div style="background:#eee; min-height:80px;"></div>`;
    for(let d=1; d<=end; d++) {
        const dStr = `${currentMonth}月${d}日`, wk = new Date(currentYear, currentMonth-1, d).getDay(), key = `${currentMonth}-${d}`;
        let am=[], pm=[]; allRosterData.forEach(p=>{ if(p.schedule[currentMonth].date===dStr){ if(p.schedule[currentMonth].time==="上午") am.push(p.name); else pm.push(p.name); }});
        grid.innerHTML += `<div class="cal-box" style="min-height:100px; background:white; border:1px solid #ddd; ${wk===0||wk===6||holidayMap[key]?'background:#ffebee;':''}">
            <div>${d} <small style="color:red">${holidayMap[key]||''}</small></div>
            <div style="text-align:left;">上午:${am.join(',')||'-'}<br>下午:${pm.join(',')||'-'}</div>
        </div>`;
    }
}

function renderList() {
    const tb = document.getElementById("listTb"), end = new Date(currentYear, currentMonth, 0).getDate();
    tb.innerHTML = "";
    for(let d=1; d<=end; d++) {
        const dStr = `${currentMonth}月${d}日`, wk = new Date(currentYear, currentMonth-1, d).getDay();
        let am=[], pm=[]; allRosterData.forEach(p=>{ if(p.schedule[currentMonth].date===dStr){ if(p.schedule[currentMonth].time==="上午") am.push(p.name); else pm.push(p.name); }});
        if(am.length||pm.length) tb.innerHTML += `<tr><td>${currentMonth}/${d}</td><td class="header-highlight">${dayNames[wk]}</td><td class="bg-am">${am.join(',')}</td><td class="bg-pm">${pm.join(',')}</td></tr>`;
    }
}

function exportFullYearExcel() {
    const wb = XLSX.utils.book_new();
    for(let m=1; m<=12; m++) {
        let data = [["115年", m+"月", "展平鎮 值星"], ["日期","星期","上午","下午"]];
        for(let d=1; d<=new Date(currentYear,m,0).getDate(); d++) {
            const ds = `${m}月${d}日`, wk = new Date(currentYear,m-1,d).getDay();
            let am=[], pm=[]; allRosterData.forEach(p=>{ if(p.schedule[m].date===ds){ if(p.schedule[m].time==="上午") am.push(p.name); else pm.push(p.name); }});
            if(am.length||pm.length) data.push([`${m}/${d}`, dayNames[wk], am.join(','), pm.join(',')]);
        }
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), m+"月");
    }
    XLSX.writeFile(wb, `展平鎮值星表.xlsx`);
}

function saveData() {
    const now = new Date();
    const timestamp = (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0') + "_" + now.getHours().toString().padStart(2, '0') + now.getMinutes().toString().padStart(2, '0');
    const blob = new Blob([JSON.stringify({ year: currentYear, data: allRosterData, staffRaw: staffData })], {type:"text/plain"});
    const fileName = `展平鎮值星存檔_115年_${timestamp}.txt`;
    const a = document.createElement("a"); 
    a.href = URL.createObjectURL(blob); 
    a.download = fileName; 
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function loadData(e) {
    const reader = new FileReader();
    reader.onload = (ev) => { 
        const res = JSON.parse(ev.target.result); 
        allRosterData = res.data; if(res.staffRaw) staffData = res.staffRaw;
        updateAllDeptSelectors(); renderAll(); alert("讀取成功"); 
    };
    reader.readAsText(e.target.files[0]);
}

function openTab(evt, tabName) {
    document.querySelectorAll(".tab-content, .tab-btn").forEach(el => el.classList.remove("active"));
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
}
