let allRosterData = [], currentYear = 2026, currentMonth = 1;

(function init(){
    const ys = document.querySelectorAll(".sync-year"), ms = document.querySelectorAll(".sync-month");
    const sM = document.getElementById("startM"), eM = document.getElementById("endM");
    ys.forEach(s => { for(let y=2025; y<=2030; y++) s.innerHTML += `<option value="${y}">${y}年</option>`; s.value = 2026; });
    ms.forEach(s => { for(let m=1; m<=12; m++) s.innerHTML += `<option value="${m}">${m}月</option>`; s.value = 1; });
    for(let m=1; m<=12; m++){ sM.innerHTML += `<option value="${m}">${m}</option>`; eM.innerHTML += `<option value="${m}">${m}</option>`; }
    sM.value = 5; eM.value = 12;

    const h1 = document.getElementById("hRow1"), h2 = document.getElementById("hRow2");
    h1.innerHTML = `<th rowspan="2" class="fix-col-1">單位</th><th rowspan="2" class="fix-col-2">人員姓名</th><th rowspan="2" class="fix-col-3">全年度<br>次數</th>`;

    initData();
})();

function initData() {
    allRosterData = [];
    Object.keys(staffData).forEach(dept => {
        staffData[dept].forEach(name => {
            let p = { dept, name, schedule: Object.fromEntries(Array.from({length:12}, (_,i)=>[i+1, {date:"", time:""}])) };
            importData.forEach(item => {
                if (item.am === name) { p.schedule[item.m].date = `${item.m}月${item.d}日`; p.schedule[item.m].time = "上午"; }
                if (item.pm === name) { p.schedule[item.m].date = `${item.m}月${item.d}日`; p.schedule[item.m].time = "下午"; }
            });
            allRosterData.push(p);
        });
    });
    renderAll();
}

// (其他原本功能如 autoScheduleRange, getConflicts, renderAll 等保持原樣)
function autoScheduleRange() {
    const start = parseInt(document.getElementById("startM").value), end = parseInt(document.getElementById("endM").value);
    if(start > end) return alert("月份範圍選擇錯誤");
    if(!confirm(`自動排定 ${start}月至${end}月 班表？\n1. 單位集中\n2. 次數公平\n3. 避開衝突\n4. 不可連排三月`)) return;
    allRosterData.forEach(p => { for(let m=start; m<=end; m++){ p.schedule[m].date=""; p.schedule[m].time=""; }});
    for(let m=start; m<=end; m++) {
        const workDays = getWorkdays(currentYear, m);
        let slots = [];
        workDays.forEach(d => { slots.push({date: d, time: "上午"}); slots.push({date: d, time: "下午"}); });
        slots.forEach(slot => {
            let candidates = allRosterData.filter(p => {
                if (m >= 3 && p.schedule[m-1].date && p.schedule[m-2].date) return false;
                return !p.schedule[m].date;
            }).map(p => {
                let totalCount = 0; for(let i=1; i<=12; i++) if(p.schedule[i].date) totalCount++;
                let deptInMonth = allRosterData.filter(x => x.dept === p.dept && x.schedule[m].date).length;
                let lastTime = ""; for(let i=m-1; i>=1; i--) if(p.schedule[i].date){ lastTime = p.schedule[i].time; break; }
                return { p, totalCount, deptScore: deptInMonth > 0 ? 0 : 1, isTimeConflict: (lastTime === slot.time) ? 1 : 0 };
            });
            candidates.sort((a,b) => {
                if(a.isTimeConflict !== b.isTimeConflict) return a.isTimeConflict - b.isTimeConflict;
                if(a.deptScore !== b.deptScore) return a.deptScore - b.deptScore;
                return a.totalCount - b.totalCount;
            });
            if(candidates.length > 0) {
                let winner = candidates[0].p;
                winner.schedule[m].date = slot.date; winner.schedule[m].time = slot.time;
            }
        });
    }
    renderAll();
    alert("預排完成！");
}

function changeFontSize(val) {
    document.documentElement.style.setProperty('--main-font-size', val + 'px');
    document.getElementById("fontSizeVal").innerText = val + "px";
}

function getWorkdays(y, m) {
    let days = [], end = new Date(y, m, 0).getDate();
    for(let d=1; d<=end; d++) {
        let wk = new Date(y, m-1, d).getDay(); let key = `${m}-${d}`;
        if(!holidayMap[key] && wk!==0 && wk!==6) days.push(`${m}月${d}日`);
    }
    return days;
}

function getConflicts() {
    let redConflictKeys = [], personConflictList = [], redArr = [], purArr = [];
    for(let m=1; m<=12; m++) {
        let dayCheck = {};
        allRosterData.forEach(p => {
            if(p.schedule[m].date && p.schedule[m].time) {
                let key = `${p.schedule[m].date}-${p.schedule[m].time}`;
                if(!dayCheck[key]) dayCheck[key] = []; dayCheck[key].push(p.name);
            }
        });
        for(let k in dayCheck) if(dayCheck[k].length > 1) {
            redArr.push(`[${m}月 ${k}] 重複：${dayCheck[k].join(',')}`);
            dayCheck[k].forEach(name => { if(!personConflictList.includes(name)) personConflictList.push(name); redConflictKeys.push(`${m}-${k}`); });
        }
    }
    allRosterData.forEach(p => {
        let activeMonths = [];
        for(let m=1; m<=12; m++) if(p.schedule[m].date) activeMonths.push({ m, time: p.schedule[m].time });
        for(let i=0; i<activeMonths.length-2; i++){
            if(activeMonths[i+1].m === activeMonths[i].m + 1 && activeMonths[i+2].m === activeMonths[i+1].m + 1) {
                purArr.push(`🚫 ${p.name} 違反原則：連續於 ${activeMonths[i].m}、${activeMonths[i+1].m}、${activeMonths[i+2].m} 月均有排班`);
                if(!personConflictList.includes(p.name)) personConflictList.push(p.name);
            }
        }
        for(let i=0; i<activeMonths.length-1; i++) {
            if(activeMonths[i+1].time === activeMonths[i].time) {
                purArr.push(`⚠️ ${p.name} 時段重複：${activeMonths[i].m}月與${activeMonths[i+1].m}月皆為 [${activeMonths[i].time}]`);
                if(!personConflictList.includes(p.name)) personConflictList.push(p.name);
            }
        }
    });
    const rd = document.getElementById("warnRed"), pd = document.getElementById("warnPurple");
    rd.style.display = redArr.length ? "block" : "none"; rd.innerHTML = "🚫 <b>同日時段重複：</b><br>" + redArr.join("<br>");
    pd.style.display = purArr.length ? "block" : "none"; pd.innerHTML = "⚠️ <b>排班規則警示：</b><br>" + purArr.join("<br>");
    return { redConflictKeys, personConflictList };
}

function renderAll() {
    const filter = document.getElementById("filterDept").value || "ALL", tbody = document.getElementById("tb");
    const filterSelect = document.getElementById("filterDept");
    if(filterSelect.options.length <= 1) {
        filterSelect.innerHTML = `<option value="ALL">全部單位</option>`;
        Object.keys(staffData).forEach(d => filterSelect.innerHTML += `<option value="${d}">${d}</option>`);
    }
    tbody.innerHTML = "";
    const { redConflictKeys, personConflictList } = getConflicts();
    allRosterData.forEach(p => {
        if(filter !== "ALL" && p.dept !== filter) return;
        let total = 0; for(let m=1; m<=12; m++) if(p.schedule[m].date) total++;
        const isConflict = personConflictList.includes(p.name);
        const tr = document.createElement("tr");
        tr.innerHTML = `<td class="fix-col-1 ${isConflict?'conflict-text':''}">${p.dept}</td>
                        <td class="fix-col-2 ${isConflict?'conflict-text':''}">${p.name}</td>
                        <td class="fix-col-3">${total}</td>`;
        for(let m=1; m<=12; m++) {
            const tdD = document.createElement("td"), tdT = document.createElement("td");
            const sD = document.createElement("select"), sT = document.createElement("select");
            sD.innerHTML = `<option value="">-</option>` + getWorkdays(currentYear, m).map(d=>`<option value="${d}">${d}</option>`).join('');
            sD.value = p.schedule[m].date; sD.onchange = (e) => { p.schedule[m].date = e.target.value; renderAll(); };
            sT.innerHTML = `<option value="">-</option><option value="上午">上午</option><option value="下午">下午</option>`;
            sT.value = p.schedule[m].time; sT.onchange = (e) => { p.schedule[m].time = e.target.value; renderAll(); };
            if(p.schedule[m].date && p.schedule[m].time) {
                const key = `${m}-${p.schedule[m].date}-${p.schedule[m].time}`;
                if(redConflictKeys.includes(key)){ sD.classList.add("conflict-border"); sT.classList.add("conflict-border"); }
                tdD.className = tdT.className = (sT.value==="上午"?"bg-am":"bg-pm");
            }
            tdD.appendChild(sD); tdT.appendChild(sT); tr.appendChild(tdD); tr.appendChild(tdT);
        }
        tbody.appendChild(tr);
    });
    renderCalendar(); renderList();
}

function syncGlobal(type, val) {
    if(type==='year') currentYear=parseInt(val); else currentMonth=parseInt(val);
    const txt = `115年 ${currentMonth}月 展平鎮 值星`;
    document.getElementById("calTitle").innerText = txt; document.getElementById("listTitle").innerText = txt;
    document.getElementById("printEditorTitle").innerText = `展平鎮 值星排班表 (${document.getElementById("filterDept").value})`;
    renderAll();
}

function renderCalendar() {
    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = dayNames.map(d=>`<div class="header-highlight" style="font-size:22px !important; padding:8px !important;">${d}</div>`).join('');
    const first = new Date(currentYear, currentMonth-1, 1).getDay(), end = new Date(currentYear, currentMonth, 0).getDate();
    for(let i=0; i<first; i++) grid.innerHTML += `<div style="background:#eee; min-height:80px;"></div>`;
    for(let d=1; d<=end; d++) {
        const dStr = `${currentMonth}月${d}日`, wk = new Date(currentYear, currentMonth-1, d).getDay(), key = `${currentMonth}-${d}`;
        let am=[], pm=[]; allRosterData.forEach(p=>{ if(p.schedule[currentMonth].date===dStr){ if(p.schedule[currentMonth].time==="上午") am.push(p.name); else pm.push(p.name); }});
        grid.innerHTML += `<div class="cal-box" style="min-height:100px; background:white; border:1px solid #ddd; ${wk===0||wk===6||holidayMap[key]?'background:#ffebee;':''}">
            <div style="font-size:1.2em">${d} <small style="color:red">${holidayMap[key]||''}</small></div>
            <div style="font-size:1.0em; text-align:left; padding-left:5px;">上午:${am.join(',')||'-'}<br>下午:${pm.join(',')||'-'}</div>
        </div>`;
    }
}

function renderList() {
    const tb = document.getElementById("listTb"), end = new Date(currentYear, currentMonth, 0).getDate();
    tb.innerHTML = "";
    for(let d=1; d<=end; d++) {
        const dStr = `${currentMonth}月${d}日`, wk = new Date(currentYear, currentMonth-1, d).getDay();
        let am=[], pm=[]; allRosterData.forEach(p=>{ if(p.schedule[currentMonth].date===dStr){ if(p.schedule[currentMonth].time==="上午") am.push(p.name); else pm.push(p.name); }});
        if(am.length||pm.length) tb.innerHTML += `<tr><td style="border:1px solid #ddd; padding:10px; font-size:1.2em;">${currentMonth}/${d}</td><td class="header-highlight" style="font-size:1.2em !important;">${dayNames[wk]}</td><td class="bg-am" style="border:1px solid #ddd; font-size:1.2em;">${am.join(',')}</td><td class="bg-pm" style="border:1px solid #ddd; font-size:1.2em;">${pm.join(',')}</td></tr>`;
    }
}

function exportFullYearExcel() {
    const wb = XLSX.utils.book_new();
    for(let m=1; m<=12; m++) {
        let data = [["115年", m+"月", "展平鎮 值星"], ["日期","星期","上午","下午"]];
        for(let d=1; d<=new Date(currentYear,m,0).getDate(); d++) {
            const ds = `${m}月${d}日`, wk = new Date(currentYear,m-1,d).getDay();
            let am=[], pm=[]; allRosterData.forEach(p=>{ if(p.schedule[m].date===ds){ if(p.schedule[m].time==="上午") am.push(p.name); else pm.push(p.name); }});
            if(am.length||pm.length) data.push([`${m}/${d}`, dayNames[wk], am.join(','), pm.join(',')]);
        }
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), m+"月");
    }
    XLSX.writeFile(wb, `展平鎮值星表.xlsx`);
}

function saveData() {
    const blob = new Blob([JSON.stringify({year: currentYear, data: allRosterData})], {type:"text/plain"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `值星存檔_115.txt`; a.click();
}

function loadData(e) {
    const reader = new FileReader();
    reader.onload = (ev) => { const res = JSON.parse(ev.target.result); allRosterData = res.data; renderAll(); alert("讀取成功"); };
    reader.readAsText(e.target.files[0]);
}

function openTab(evt, tabName) {
    document.querySelectorAll(".tab-content, .tab-btn").forEach(el => el.classList.remove("active"));
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
}
</script>
</body>
